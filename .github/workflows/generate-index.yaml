name: Generate Module Index

on:
  push:
    branches: [main]
    paths:
      - 'registry/**/*.yaml'
      - 'categories.yaml'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate INDEX.md
        run: |
          python3 .github/scripts/generate-index.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add INDEX.md
          git diff --cached --quiet || git commit -m "docs: auto-generate module index"
          git push
